openapi: 3.1.0
info:
  title: find dish
  version: 1.0.0
servers:
  - url: http://localhost:8080

paths:
  '/ingredient':
    description: retourne tous les ingrédients
    get:
      responses:
        '200':
          description: succès de la requête
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientEntity'

  '/ingredient/{id}':
    description: retourne l'ingrédient correspondant à l'id
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: succès de la requête
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientEntity'

  '/ingredients/{id}/stock':
    get:
      summary: retourne la valeur du stock d'un ingrédient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-01-02T12:00:00Z"
        - name: unit
          in: query
          required: true
          description: Unité du stock à récupérer
          schema:
            type: string
      responses:
        '200':
          description: succès de la requête
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValues'
        '400':
          description: Paramètre obligatoire manquant
          content:
            text/plain:
              schema:
                type: string
              example: "Either mandatory query parameter `at` or `unit` is not provided."

  /ingredients/{id}/stockMovements:
    get:
      summary: Retourne les mouvements de stock d'un ingrédient filtrés par plage de date
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'ingrédient
          schema:
            type: integer
        - name: from
          in: query
          required: true
          description: Début de la plage de date (format ISO-8601)
          schema:
            type: string
            format: date-time
            example: "2026-01-01T00:00:00Z"
        - name: to
          in: query
          required: true
          description: Fin de la plage de date (format ISO-8601)
          schema:
            type: string
            format: date-time
            example: "2026-03-31T23:59:59Z"
      responses:
        '200':
          description: Liste des mouvements de stock retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockMouvement'
        '400':
          description: Paramètre obligatoire manquant
          content:
            text/plain:
                example: "Either mandatory query parameter `from` or `to` is not provided."
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
                example: "Ingredient.id=1 is not found"

    post:
      summary: Ajoute des mouvements de stock à un ingrédient
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant de l'ingrédient
          schema:
            type: integer
      requestBody:
        required: true
        description: Liste des mouvements de stock à créer
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/StockMouvement'
            example:
              - unit: KG
                quantity: 5.5
                type: IN
              - unit: KG
                quantity: 2.0
                type: OUT
      responses:
        '201':
          description: Mouvements de stock créés avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockMouvement'
        '400':
          description: Corps de la requête manquant ou vide
          content:
            text/plain:
              schema:
                type: string
                example: "Le corps de la requête est obligatoire et doit contenir une liste de mouvements."
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"

  /dishes:
    get:
      summary: Retourne la liste de tous les plats avec leurs ingrédients
      responses:
        '200':
          description: Liste des plats retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DishEntity'

components:
  schemas:
    IngredientEntity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
          enum:
            - ANIMAL
            - VEGETABLE
            - DAIRY
            - OTHER
      example:
        id: 1
        name: Pizza
        price: 12.5
        category: ANIMAL

    DishEntity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: float
        dish_type:
          type: string
          enum:
            - DESSERT
            - STARTER
            - MAIN
      example:
        id: 3
        name: Lasagne
        price: 15.75
        dish_type: MAIN

    StockValues:
      type: object
      properties:
        quantity:
          type: integer
        unit:
          type: string
          enum:
            - KG
            - PCS
            - L
      example:
        quantity: 25
        unit: KG

    StockMouvement:
      type: object
      properties:
        id:
          type: integer
        value:
          $ref: '#/components/schemas/StockValues'
        type_mouvement:
          type: string
          enum:
            - IN
            - OUT
        creation-datetime:
          type: string
          format: date-time
